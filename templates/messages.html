{% extends "base.html" %}{% block body %}
<h2>1.3 Messaging</h2>
<form method="post">
  <input name="recipient" placeholder="Recipient username" required><br>
  <input name="body" placeholder="Message" required><br>
  <button type="submit">Send</button>
</form>
<h3>Inbox</h3>
<ul>{% for m in inbox %}<li><b>{{ m.sender }}:</b> {{ m.body }}</li>{% endfor %}</ul>
<p><a href="/">Back</a></p>
{% endblock %}
